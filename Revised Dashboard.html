.dash{background:#1a1a1a;min-height:100vh;display:flex}

.main{flex:1;padding:12px 14px;min-width:0}
.logo-tag{font-size:9px;color:#e05a4a;font-weight:700;letter-spacing:1px;margin-bottom:2px}
.logo-title{font-size:15px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:2px}
.logo-sub{font-size:9px;color:#aaa;margin-bottom:12px}
.nav-wrap{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.nav-btn{display:block;width:100%;text-align:center;padding:7px;font-size:11px;border-radius:4px;cursor:pointer;border:none;font-weight:600;letter-spacing:.4px;transition:all .15s}
.nav-active{background:#e05a4a;color:#fff}
.nav-ghost{background:#1e1e1e;color:#777;border:1px solid #2a2a2a}
.nav-ghost:hover{background:#252525;color:#ccc}
.sb-label{font-size:9px;color:#666;margin:10px 0 5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.sb-select{width:100%;background:#1e1e1e;color:#ccc;border:.5px solid #333;padding:5px 7px;font-size:11px;border-radius:4px;margin-bottom:6px}
.drill-reg-btn{display:block;width:100%;text-align:left;padding:5px 9px;font-size:11px;border-radius:4px;cursor:pointer;border:1px solid transparent;font-weight:500;margin-bottom:3px;transition:all .15s;background:#1e1e1e;color:#777}
.drill-reg-btn:hover:not(.on){background:#252525;color:#ccc}
.kpi-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:12px}
.kpi{background:#222;border-radius:6px;padding:9px 11px;border-top:3px solid #e05a4a}
.kpi-lbl{font-size:9px;color:#888;margin-bottom:4px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.kpi-val{font-size:18px;font-weight:700;color:#fff;line-height:1}
.kpi-sub{font-size:9px;color:#e05a4a;margin-top:3px}
.section-divider{border:none;border-top:1px solid #2a2a2a;margin:12px 0}
.section-label{font-size:10px;font-weight:700;color:#888;letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px}
.charts-row{display:grid;grid-template-columns:1fr 280px;gap:10px;margin-bottom:10px}
.panel{background:#222;border-radius:6px;padding:11px;border:1px solid #2a2a2a}
.panel-title{font-size:11px;font-weight:700;color:#ddd;margin-bottom:5px}
.panel-sub{font-size:9px;color:#666;margin-bottom:8px}
.toggle-row{display:flex;gap:3px}
.tgl{font-size:10px;padding:2px 9px;border-radius:3px;cursor:pointer;border:none;background:#2a2a2a;color:#777;transition:all .15s}
.tgl.on{background:#e05a4a;color:#fff}
.bottom-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.bar-wrap{margin-bottom:5px}
.bar-row{display:flex;align-items:center;gap:7px}
.bar-lbl{font-size:10px;color:#bbb;text-align:right;flex-shrink:0;width:68px;line-height:1.2}
.bar-track{flex:1;background:#2a2a2a;border-radius:3px;height:17px;position:relative}
.bar-fill{height:100%;border-radius:3px;min-width:3px;position:absolute;left:0;top:0}
.bv-in{font-size:9px;color:#fff;font-weight:700;position:absolute;right:5px;top:50%;transform:translateY(-50%);white-space:nowrap;pointer-events:none}
.bv-out{font-size:9px;color:#fff;font-weight:700;position:absolute;top:50%;transform:translateY(-50%);white-space:nowrap;pointer-events:none}
table{width:100%;border-collapse:collapse}
th{font-size:9px;color:#666;font-weight:700;padding:5px 7px;border-bottom:1px solid #2a2a2a;text-align:left;text-transform:uppercase;letter-spacing:.4px}
td{font-size:10px;color:#ccc;padding:5px 7px;border-bottom:.5px solid #252525}
tr:hover td{background:#252525}
.spill{font-size:10px;padding:3px 10px;border-radius:10px;cursor:pointer;border:1.5px solid;background:transparent;font-weight:500;transition:all .15s;margin-bottom:4px}

function fmt(n){
  if(n>=1e9)return(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return Math.round(n).toLocaleString();
}

// CAGR: Compound Annual Growth Rate — avoids astronomical % from tiny base values
function calcCAGR(first, last, years){
  if(!first||first<=0||years<=1) return null;
  const rate = (Math.pow(last/first, 1/(years-1)) - 1)*100;
  return rate;
}
function fmtCAGR(first, last, n){
  const r = calcCAGR(first, last, n);
  if(r===null) return '—';
  const sign = r>=0?'+':'';
  return sign+r.toFixed(1)+'%/yr';
}
function cagrColor(first, last, n){
  const r = calcCAGR(first, last, n);
  if(r===null) return '#888';
  return r>=0?'#3dbf8a':'#e05a4a';
}

function getYears(p){
  if(p==='recent')return ALLYEARS.filter(y=>y>=2000&&y<=2022);
  if(p==='mid')return ALLYEARS.filter(y=>y>=1980&&y<=1999);
  if(p==='early')return ALLYEARS.filter(y=>y>=1950&&y<=1979);
  return ALLYEARS;
}

function makeBars(items,maxVal,colorFn){
  return items.map((it,i)=>{
    const pct=Math.max(2,(it.v/maxVal*100));
    const useIn=pct>42;
    const color=colorFn?colorFn(i):'#e05a4a';
    const valStr=fmt(it.v);
    return `<div class="bar-wrap"><div class="bar-row">
      <div class="bar-lbl">${it.l}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${color}">
          ${useIn?`<span class="bv-in">${valStr}</span>`:''}
        </div>
        ${!useIn?`<span class="bv-out" style="left:calc(${pct}% + 4px)">${valStr}</span>`:''}
      </div>
    </div></div>`;
  }).join('');
}

      <td>${fmt(tot)}</td><td>${pkY}</td><td>${fmt(pk)}</td>
      <td><div style="display:flex;align-items:center;gap:5px"><div style="background:#2a2a2a;border-radius:2px;height:7px;width:44px;overflow:hidden"><div style="background:${RCOLORS[i]};height:100%;width:${Math.min(100,pct)}%;border-radius:2px"></div></div><span>${pct}%</span></div></td>
      <td><svg width="56" height="20"><polyline points="${pts}" fill="none" stroke="${RCOLORS[i]}" stroke-width="1.5"/></svg></td>
      <td style="color:${cClr};font-weight:600">${cagr}</td>
    </tr>`;
  }).join('');

  document.getElementById('panelOverview').innerHTML=`
    <div class="section-label">KPIs</div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-lbl">Total Arrivals</div><div class="kpi-val">${fmt(total)}</div><div class="kpi-sub">${years[0]}–${years[years.length-1]}</div></div>
      <div class="kpi"><div class="kpi-lbl">Peak Year</div><div class="kpi-val">${peakY}</div><div class="kpi-sub">Record high</div></div>
      <div class="kpi"><div class="kpi-lbl">Peak Value</div><div class="kpi-val">${fmt(peak)}</div><div class="kpi-sub">${peakY}</div></div>
      <div class="kpi"><div class="kpi-lbl">Avg Annual</div><div class="kpi-val">${fmt(Math.round(total/Math.max(years.length,1)))}</div><div class="kpi-sub">Per year</div></div>
      <div class="kpi"><div class="kpi-lbl">CAGR</div><div class="kpi-val" style="font-size:15px;color:${cagrClr}">${cagrStr}</div><div class="kpi-sub">Compound annual growth</div></div>
    </div>
    <hr class="section-divider">
    <div class="section-label">Trend & Regional Breakdown</div>
    <div class="charts-row">
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div class="panel-title">Immigration trend</div><div class="panel-sub">By year — ${years[0]} to ${years[years.length-1]}</div></div>
          <div class="toggle-row">
            <button class="tgl ${ovChartView==='bar'?'on':''}" onclick="ovSetView('bar')">Bar</button>
            <button class="tgl ${ovChartView==='line'?'on':''}" onclick="ovSetView('line')">Line</button>
          </div>
        </div>
        <div style="position:relative;width:100%;height:175px"><canvas id="ovTrend"></canvas></div>
      </div>
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div><div class="panel-title">By region</div><div class="panel-sub">Share of total arrivals</div></div>
          <div class="toggle-row">
            <button class="tgl ${ovSubcatMode==='%'?'on':''}" onclick="ovSetSubcat('%')">%</button>
            <button class="tgl ${ovSubcatMode==='total'?'on':''}" onclick="ovSetSubcat('total')">Total</button>
          </div>
        </div>
        ${regBarsHtml}
      </div>
    </div>
    <hr class="section-divider">
    <div class="section-label">Breakdowns</div>
    <div class="bottom-row">
      <div class="panel"><div class="panel-title" style="margin-bottom:8px">By decade</div>${decBarsHtml}</div>
      <div class="panel"><div class="panel-title" style="margin-bottom:4px">Continent share</div><div class="panel-sub">Position on common scale</div><div style="margin-top:6px">${shareBarsHtml}</div></div>
      <div class="panel"><div class="panel-title" style="margin-bottom:8px">Top countries</div>${topCtryHtml}</div>
    </div>
    <hr class="section-divider">
    <div class="section-label">Region Details</div>
    <div class="panel">
      <table><thead><tr><th>Region</th><th>Total</th><th>Peak Yr</th><th>Peak</th><th>Share</th><th>Trend</th><th>CAGR</th></tr></thead>
      <tbody>${tableRows}</tbody></table>
    </div>`;

  if(ovChart)ovChart.destroy();
  const rIdxColor=regionId==='all'?0:REGIONS.indexOf(regionId);
  const barColor=RCOLORS[Math.max(0,rIdxColor)];
  ovChart=new Chart(document.getElementById('ovTrend'),{
    type:ovChartView==='bar'?'bar':'line',
    data:{labels:years,datasets:[{label:'Arrivals',data:arr,backgroundColor:barColor+'cc',borderColor:barColor,borderWidth:ovChartView==='line'?2:0,pointRadius:0,fill:ovChartView==='line',tension:.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)},backgroundColor:'#1e1e1e',borderColor:'#333',borderWidth:1,titleColor:'#fff',bodyColor:'#ccc'}},scales:{x:{ticks:{maxTicksLimit:10,color:'#555',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{callback:v=>fmt(v),color:'#555',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}}}}
  });
}

function ovSetView(v){ovChartView=v;renderOverview();}
function ovSetSubcat(v){ovSubcatMode=v;renderOverview();}

function buildDrillRegBtns(){
  const el=document.getElementById('drillRegBtns');
  el.innerHTML=REGIONS.map((r,i)=>`<button class="drill-reg-btn${r===drillRegion?' on':''}" style="${r===drillRegion?'background:'+RCOLORS[i]+';color:#fff;border-color:'+RCOLORS[i]:''}" onclick="setDrillReg('${r}')">${RLABELS[i]}</button>`).join('');
}

function setDrillReg(r){drillRegion=r;drillCountries=[];buildDrillRegBtns();renderDrill();}

function renderDrill(){
  buildDrillRegBtns();
  const period=document.getElementById('drPeriod').value;
  const years=getYears(period);
  const rIdx=REGIONS.indexOf(drillRegion);
  const rColor=RCOLORS[rIdx];
  const rLabel=RLABELS[rIdx];
  const clist=COUNTRIES[drillRegion]||[];

  const pillsHtml=clist.map((c,i)=>{
    const on=drillCountries.includes(c.k);
    const clr=COUNTRY_PALETTE[i%COUNTRY_PALETTE.length];
    return `<button class="spill${on?' on':''}" style="border-color:${clr};color:${on?'#fff':clr};background:${on?clr:'transparent'}" onclick="toggleDrillCountry('${c.k}')">${c.l}</button>`;
  }).join('');

  const activeCtry=drillCountries.length>0?clist.filter(c=>drillCountries.includes(c.k)):null;
  const totArr=years.map(y=>RD[drillRegion][y-1950]);
  const tot=totArr.reduce((a,b)=>a+b,0);
  const peak=Math.max(...totArr);
  const peakY=years[totArr.indexOf(peak)];
  const first=totArr[0],last=totArr[totArr.length-1];
  const cagrStr=fmtCAGR(first,last,years.length);
  const cagrClr=cagrColor(first,last,years.length);

  const ctryItems=clist.map((c,i)=>({l:c.l,v:Math.round(years.reduce((s,y)=>s+RD[drillRegion][y-1950]*c.f,0)),i})).sort((a,b)=>b.v-a.v);
  const maxC=ctryItems[0]?.v||1;
  const ctryBarsHtml=makeBars(ctryItems,maxC,(i)=>COUNTRY_PALETTE[ctryItems[i].i%COUNTRY_PALETTE.length]);

  const legendHtml=activeCtry?'<div class="legend-row">'+activeCtry.map(c=>{
    const idx=clist.indexOf(c);
    return `<span class="leg-item"><span class="leg-dot" style="background:${COUNTRY_PALETTE[idx%COUNTRY_PALETTE.length]}"></span>${c.l}</span>`;
  }).join('')+'</div>':'';

  document.getElementById('panelDrill').innerHTML=`
    <div class="section-label" style="display:flex;align-items:center;gap:8px">
      <span style="width:11px;height:11px;border-radius:2px;background:${rColor};display:inline-block"></span>
      Drill Down — ${rLabel}
    </div>
    <div style="font-size:10px;color:#666;margin-bottom:10px">Select country pills to compare. Leave all deselected to see the full region trend.</div>
    <div class="panel" style="margin-bottom:10px">
      <div class="panel-title" style="margin-bottom:6px">Countries in ${rLabel}</div>
      <div class="sub-pills">${pillsHtml}</div>
    </div>
    <div class="kpi-row">
      <div class="kpi" style="border-top-color:${rColor}"><div class="kpi-lbl">Region Total</div><div class="kpi-val">${fmt(tot)}</div><div class="kpi-sub">Selected period</div></div>
      <div class="kpi" style="border-top-color:${rColor}"><div class="kpi-lbl">Peak Year</div><div class="kpi-val">${peakY}</div><div class="kpi-sub">${fmt(peak)}</div></div>
      <div class="kpi" style="border-top-color:${rColor}"><div class="kpi-lbl">Avg Annual</div><div class="kpi-val">${fmt(Math.round(tot/Math.max(years.length,1)))}</div><div class="kpi-sub">Per year</div></div>
      <div class="kpi" style="border-top-color:${rColor}"><div class="kpi-lbl">Countries</div><div class="kpi-val">${clist.length}</div><div class="kpi-sub">In region</div></div>
      <div class="kpi" style="border-top-color:${rColor}"><div class="kpi-lbl">CAGR</div><div class="kpi-val" style="font-size:14px;color:${cagrClr}">${cagrStr}</div><div class="kpi-sub">Compound annual growth</div></div>
    </div>
    <hr class="section-divider">
    <div class="section-label">Trend & Country Breakdown</div>
    <div class="charts-row">
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="panel-title">${activeCtry?'Country comparison':'Region trend — '+rLabel}</div>
            <div class="panel-sub">${activeCtry?activeCtry.map(c=>c.l).join(', '):'All countries combined'}</div>
          </div>
          <div class="toggle-row">
            <button class="tgl ${drillChartView==='bar'?'on':''}" onclick="setDrillView('bar')">Bar</button>
            <button class="tgl ${drillChartView==='line'?'on':''}" onclick="setDrillView('line')">Line</button>
          </div>
        </div>
        ${legendHtml}
        <div style="position:relative;width:100%;height:200px"><canvas id="drillTrend"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-title">Country breakdown</div>
        <div class="panel-sub">Cumulative total — ranked</div>
        <div style="margin-top:6px">${ctryBarsHtml}</div>
      </div>
    </div>`;

  if(drillChart)drillChart.destroy();
  let datasets;
  if(activeCtry){
    datasets=activeCtry.map(c=>{
      const idx=clist.indexOf(c);
      const clr=COUNTRY_PALETTE[idx%COUNTRY_PALETTE.length];
      return{label:c.l,data:years.map(y=>Math.round(RD[drillRegion][y-1950]*c.f)),backgroundColor:clr+'bb',borderColor:clr,borderWidth:drillChartView==='line'?2:0,pointRadius:drillChartView==='line'&&years.length<30?3:0,fill:false,tension:.3};
    });
  } else {
    datasets=[{label:rLabel,data:totArr,backgroundColor:rColor+'bb',borderColor:rColor,borderWidth:drillChartView==='line'?2:0,pointRadius:0,fill:drillChartView==='line',tension:.3}];
  }
  drillChart=new Chart(document.getElementById('drillTrend'),{
    type:drillChartView==='bar'?'bar':'line',
    data:{labels:years,datasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+fmt(c.raw)},backgroundColor:'#1e1e1e',borderColor:'#333',borderWidth:1,titleColor:'#fff',bodyColor:'#ccc'}},scales:{x:{ticks:{maxTicksLimit:10,color:'#555',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{callback:v=>fmt(v),color:'#555',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}}}}
  });
}

function toggleDrillCountry(k){
  const idx=drillCountries.indexOf(k);
  if(idx>=0)drillCountries.splice(idx,1);else drillCountries.push(k);
  renderDrill();
}
function setDrillView(v){drillChartView=v;renderDrill();}
document.getElementById('drPeriod').addEventListener('change',renderDrill);
renderOverview();
</script>
