
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
.dash{background:#1a1a1a;min-height:100vh;display:flex}
.sidebar{width:160px;background:#111;flex-shrink:0;padding:12px 10px;display:flex;flex-direction:column}
.main{flex:1;padding:10px 12px;min-width:0}
.logo-tag{font-size:9px;color:#e05a4a;font-weight:700;letter-spacing:1px;margin-bottom:2px}
.logo-title{font-size:15px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:2px}
.logo-sub{font-size:9px;color:#aaa;margin-bottom:10px}
.nav-btn{display:block;width:100%;text-align:center;padding:6px;font-size:11px;border-radius:3px;cursor:pointer;margin-bottom:5px;border:none;font-weight:600;letter-spacing:.5px;transition:all .15s}
.nav-active{background:#e05a4a;color:#fff}
.nav-ghost{background:#222;color:#888}
.nav-ghost:hover{background:#2a2a2a;color:#ccc}
.sb-label{font-size:10px;color:#888;margin:10px 0 5px;font-weight:600;letter-spacing:.5px}
.sb-select{width:100%;background:#222;color:#ccc;border:.5px solid #444;padding:5px 6px;font-size:11px;border-radius:3px;margin-bottom:6px}
.drill-reg-btn{display:block;width:100%;text-align:left;padding:5px 8px;font-size:11px;border-radius:3px;cursor:pointer;border:none;font-weight:500;margin-bottom:3px;transition:all .15s;background:#222;color:#888}
.drill-reg-btn.on{background:#e05a4a;color:#fff}
.drill-reg-btn:hover:not(.on){background:#2a2a2a;color:#ccc}
.kpi-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:10px}
.kpi{background:#222;border-radius:4px;padding:8px 10px;border-top:3px solid #e05a4a}
.kpi-lbl{font-size:10px;color:#aaa;margin-bottom:3px;font-weight:600}
.kpi-val{font-size:17px;font-weight:700;color:#fff;line-height:1}
.kpi-sub{font-size:9px;color:#e05a4a;margin-top:3px}
.charts-row{display:grid;grid-template-columns:1fr 260px;gap:10px;margin-bottom:10px}
.panel{background:#222;border-radius:4px;padding:10px}
.panel-title{font-size:11px;font-weight:700;color:#fff;margin-bottom:6px}
.toggle-row{display:flex;gap:3px;margin-bottom:6px}
.tgl{font-size:10px;padding:2px 8px;border-radius:2px;cursor:pointer;border:none;background:#333;color:#888;transition:all .15s}
.tgl.on{background:#e05a4a;color:#fff}
.bottom-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.bar-wrap{margin-bottom:6px}
.bar-row{display:flex;align-items:center;gap:6px}
.bar-lbl{font-size:10px;color:#ccc;text-align:right;flex-shrink:0;width:62px}
.bar-track{flex:1;background:#333;border-radius:2px;height:16px;position:relative;overflow:visible}
.bar-fill{height:100%;background:#e05a4a;border-radius:2px;min-width:2px;position:relative}
.bv-in{font-size:9px;color:#fff;font-weight:600;position:absolute;right:5px;top:50%;transform:translateY(-50%);white-space:nowrap}
.bv-out{font-size:9px;color:#e05a4a;font-weight:600;position:absolute;top:50%;transform:translateY(-50%);white-space:nowrap}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:#888;font-weight:600;padding:4px 6px;border-bottom:1px solid #333;text-align:left}
td{font-size:10px;color:#ccc;padding:4px 6px;border-bottom:.5px solid #2a2a2a}
.spill{font-size:10px;padding:3px 10px;border-radius:10px;cursor:pointer;border:1.5px solid #e05a4a;background:transparent;color:#e05a4a;font-weight:500;transition:all .15s;margin-bottom:4px}
.spill.on{background:#e05a4a;color:#fff}
.spill:hover:not(.on){background:rgba(224,90,74,0.15)}
.sub-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
</style>

<div class="dash">
<div class="sidebar">
  <div class="logo-tag">JAPAN IMMIGRATION</div>
  <div class="logo-title">Inbound<br>Statistics</div>
  <div class="logo-sub">1950 – 2022</div>

  <button class="nav-btn nav-active" id="navOv" onclick="switchNav('overview')">Overview</button>
  <button class="nav-btn nav-ghost" id="navDr" onclick="switchNav('drill')">Drill Down</button>

  <div id="sbOverview">
    <div class="sb-label">REGION</div>
    <select class="sb-select" id="ovRegion" onchange="renderOverview()">
      <option value="all">All regions</option>
      <option value="asia">Asia</option>
      <option value="europe">Europe</option>
      <option value="north_america">North America</option>
      <option value="south_america">South America</option>
      <option value="africa">Africa</option>
      <option value="oceania">Oceania</option>
    </select>
    <div class="sb-label">PERIOD</div>
    <select class="sb-select" id="ovPeriod" onchange="renderOverview()">
      <option value="all">All years</option>
      <option value="recent" selected>2000 – 2022</option>
      <option value="mid">1980 – 1999</option>
      <option value="early">1950 – 1979</option>
    </select>
  </div>

  <div id="sbDrill" style="display:none">
    <div class="sb-label">REGION</div>
    <div id="drillRegBtns"></div>
    <div class="sb-label">PERIOD</div>
    <select class="sb-select" id="drPeriod" onchange="renderDrill()">
      <option value="all">All years</option>
      <option value="recent" selected>2000 – 2022</option>
      <option value="mid">1980 – 1999</option>
      <option value="early">1950 – 1979</option>
    </select>
  </div>
</div>

<div class="main">
  <div id="panelOverview"></div>
  <div id="panelDrill" style="display:none"></div>
</div>
</div>

let currentNav = 'overview';
let drillRegion = 'asia';
let drillCountries = [];
let drillChartView = 'bar';
let ovChartView = 'bar';
let ovSubcatMode = '%';
let ovChart = null, drillChart = null, pieChart = null;

function fmt(n){
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return Math.round(n).toLocaleString();
}

function getYears(periodId){
  const p = periodId || 'all';
  if(p==='recent') return ALLYEARS.filter(y=>y>=2000&&y<=2022);
  if(p==='mid') return ALLYEARS.filter(y=>y>=1980&&y<=1999);
  if(p==='early') return ALLYEARS.filter(y=>y>=1950&&y<=1979);
  return ALLYEARS;
}

function makeBars(items, maxVal){
  return items.map(it=>{
    const w = Math.max(3, (it.v/maxVal*100));
    const useIn = w > 35;
    return `<div class="bar-wrap"><div class="bar-row">
      <div class="bar-lbl">${it.l}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${w}%">
          ${useIn?`<span class="bv-in">${fmt(it.v)}</span>`:''}
        </div>
        ${!useIn?`<span class="bv-out" style="left:calc(${w}% + 5px)">${fmt(it.v)}</span>`:''}
      </div>
    </div></div>`;
  }).join('');
}

function switchNav(which){
  currentNav = which;
  document.getElementById('navOv').className = 'nav-btn ' + (which==='overview'?'nav-active':'nav-ghost');
  document.getElementById('navDr').className = 'nav-btn ' + (which==='drill'?'nav-active':'nav-ghost');
  document.getElementById('sbOverview').style.display = which==='overview'?'block':'none';
  document.getElementById('sbDrill').style.display = which==='drill'?'block':'none';
  document.getElementById('panelOverview').style.display = which==='overview'?'block':'none';
  document.getElementById('panelDrill').style.display = which==='drill'?'block':'none';
  if(which==='drill') renderDrill();
}

function renderOverview(){
  const period = document.getElementById('ovPeriod').value;
  const regionId = document.getElementById('ovRegion').value;
  const years = getYears(period);
  const rId = regionId==='all'?'total':regionId;
  const arr = years.map(y=>RD[rId][y-1950]);
  const total = arr.reduce((a,b)=>a+b,0);
  const peak = Math.max(...arr);
  const peakY = years[arr.indexOf(peak)];
  const first=arr[0],last=arr[arr.length-1];
  const growth = first>0?((last-first)/first*100).toFixed(1):'—';

  const regionTotals = REGIONS.map(r=>years.reduce((s,y)=>s+RD[r][y-1950],0));
  const grand = regionTotals.reduce((a,b)=>a+b,0);
  const topR = RLABELS[regionTotals.indexOf(Math.max(...regionTotals))];

  document.getElementById('panelOverview').innerHTML = `
    <div style="font-size:11px;color:#888;margin-bottom:6px">KPIs :</div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-lbl">Total Arrivals</div><div class="kpi-val">${fmt(total)}</div><div class="kpi-sub">${growth!=='—'?(+growth>0?'+':'')+growth+'% growth':''}</div></div>
      <div class="kpi"><div class="kpi-lbl">Peak Year</div><div class="kpi-val">${peakY}</div><div class="kpi-sub">Record high</div></div>
      <div class="kpi"><div class="kpi-lbl">Peak Value</div><div class="kpi-val">${fmt(peak)}</div><div class="kpi-sub">${peakY}</div></div>
      <div class="kpi"><div class="kpi-lbl">Avg Annual</div><div class="kpi-val">${fmt(Math.round(total/Math.max(years.length,1)))}</div><div class="kpi-sub">Per year</div></div>
      <div class="kpi"><div class="kpi-lbl">Top Region</div><div class="kpi-val" style="font-size:13px">${topR}</div><div class="kpi-sub">Dominant</div></div>
    </div>
    <div class="charts-row">
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div class="panel-title">Immigration trend</div><div style="font-size:9px;color:#888;margin-bottom:4px">By Year</div></div>
          <div class="toggle-row">
            <button class="tgl ${ovChartView==='bar'?'on':''}" onclick="ovSetView('bar',this)">Bar</button>
            <button class="tgl ${ovChartView==='line'?'on':''}" onclick="ovSetView('line',this)">Line</button>
          </div>
        </div>
        <div style="position:relative;width:100%;height:175px"><canvas id="ovTrend"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-title">By Region</div>
        <div class="toggle-row">
          <button class="tgl ${ovSubcatMode==='%'?'on':''}" onclick="ovSetSubcat('%',this)">%</button>
          <button class="tgl ${ovSubcatMode==='total'?'on':''}" onclick="ovSetSubcat('total',this)">Total</button>
        </div>
        <div>${makeRegionBars(years,ovSubcatMode)}</div>
      </div>
    </div>
    <div style="font-size:11px;font-weight:700;color:#fff;margin-bottom:6px">Immigration :</div>
    <div class="bottom-row">
      <div class="panel"><div class="panel-title" style="margin-bottom:8px">By Decade</div>${makeDecadeBars()}</div>
      <div class="panel"><div class="panel-title" style="margin-bottom:4px">Continent Share</div><div style="position:relative;width:100%;height:130px"><canvas id="ovPie"></canvas></div></div>
      <div class="panel"><div class="panel-title" style="margin-bottom:8px">Top Countries</div>${makeTopCountries(years)}</div>
    </div>
    <div class="panel">
      <div class="panel-title" style="margin-bottom:8px">Region Details</div>
      <table><thead><tr><th>Region</th><th>Total</th><th>Peak Yr</th><th>Peak</th><th>Share</th><th>Trend</th><th>Growth</th></tr></thead>
      <tbody>${makeRegionTable(years)}</tbody></table>
    </div>`;

  if(ovChart) ovChart.destroy();
  ovChart = new Chart(document.getElementById('ovTrend'),{
    type: ovChartView==='bar'?'bar':'line',
    data:{labels:years,datasets:[{label:'Arrivals',data:arr,backgroundColor:'#e05a4a',borderColor:'#e05a4a',borderWidth:ovChartView==='line'?2:0,pointRadius:0,fill:ovChartView==='line',tension:.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)},backgroundColor:'#333',titleColor:'#fff',bodyColor:'#ccc'}},scales:{x:{ticks:{maxTicksLimit:10,color:'#666',font:{size:9}},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{callback:v=>fmt(v),color:'#666',font:{size:9}},grid:{color:'rgba(255,255,255,0.05)'}}}}
  });

  if(pieChart) pieChart.destroy();
  const pVals = REGIONS.map(r=>years.reduce((s,y)=>s+RD[r][y-1950],0));
  pieChart = new Chart(document.getElementById('ovPie'),{
    type:'doughnut',
    data:{labels:RLABELS,datasets:[{data:pVals,backgroundColor:['#e05a4a','#c94a3a','#a83a2a','#8a2a1a','#6a1a0a','#4a0a00'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'right',labels:{color:'#aaa',font:{size:9},boxWidth:10,padding:5}},tooltip:{callbacks:{label:c=>' '+c.label+': '+fmt(c.raw)},backgroundColor:'#333',bodyColor:'#ccc'}}}
  });
}

function makeRegionBars(years, mode){
  const totals = REGIONS.map(r=>years.reduce((s,y)=>s+RD[r][y-1950],0));
  const grand = totals.reduce((a,b)=>a+b,0);
  const max = Math.max(...totals);
  return makeBars(REGIONS.map((r,i)=>({l:RLABELS[i],v:mode==='%'?parseFloat((totals[i]/grand*100).toFixed(1)):totals[i]})), mode==='%'?100:max);
}

function makeDecadeBars(){
  const decades=[{l:'1950s',y1:1950,y2:1959},{l:'1960s',y1:1960,y2:1969},{l:'1970s',y1:1970,y2:1979},{l:'1980s',y1:1980,y2:1989},{l:'1990s',y1:1990,y2:1999},{l:'2000s',y1:2000,y2:2009},{l:'2010s',y1:2010,y2:2019},{l:'2020s',y1:2020,y2:2022}];
  const vals = decades.map(d=>ALLYEARS.filter(y=>y>=d.y1&&y<=d.y2).reduce((s,y)=>s+RD.total[y-1950],0));
  const max = Math.max(...vals);
  return makeBars(decades.map((d,i)=>({l:d.l,v:vals[i]})),max);
}

function makeTopCountries(years){
  const all=[];
  REGIONS.forEach(r=>{(COUNTRIES[r]||[]).forEach(c=>{all.push({l:c.l,v:Math.round(years.reduce((s,y)=>s+RD[r][y-1950]*c.f,0))});});});
  all.sort((a,b)=>b.v-a.v);
  const top=all.slice(0,8);
  return makeBars(top,top[0].v);
}

function makeRegionTable(years){
  const grand=years.reduce((s,y)=>s+RD.total[y-1950],0);
  return REGIONS.map((r,i)=>{
    const arr=years.map(y=>RD[r][y-1950]);
    const tot=arr.reduce((a,b)=>a+b,0);
    const peak=Math.max(...arr);
    const peakY=years[arr.indexOf(peak)];
    const pct=(tot/grand*100).toFixed(1);
    const growth=arr[0]>0?((arr[arr.length-1]-arr[0])/arr[0]*100).toFixed(0)+'%':'—';
    const sp=arr.filter((_,i)=>i%Math.max(1,Math.floor(arr.length/8))===0).slice(0,8);
    const mx=Math.max(...sp)||1;
    const pts=sp.map((v,i)=>`${(i/(sp.length-1||1)*56).toFixed(0)},${(18-(v/mx*16)).toFixed(0)}`).join(' ');
    return `<tr><td style="color:#e05a4a;font-weight:600">${RLABELS[i]}</td><td>${fmt(tot)}</td><td>${peakY}</td><td>${fmt(peak)}</td>
      <td><div style="background:#333;border-radius:2px;height:7px;width:50px;display:inline-block;vertical-align:middle;overflow:hidden"><div style="background:#e05a4a;height:100%;width:${Math.min(100,pct)}%;border-radius:2px"></div></div> ${pct}%</td>
      <td><svg width="56" height="20"><polyline points="${pts}" fill="none" stroke="#e05a4a" stroke-width="1.5"/></svg></td>
      <td style="color:${parseFloat(growth)>0?'#e05a4a':'#888'}">${growth}</td></tr>`;
  }).join('');
}

function ovSetView(v,btn){ovChartView=v;renderOverview();}
function ovSetSubcat(v,btn){ovSubcatMode=v;renderOverview();}

function buildDrillRegBtns(){
  const el=document.getElementById('drillRegBtns');
  el.innerHTML=REGIONS.map((r,i)=>`<button class="drill-reg-btn${r===drillRegion?' on':''}" data-r="${r}" onclick="setDrillReg(this,'${r}')">${RLABELS[i]}</button>`).join('');
}

function setDrillReg(btn,r){
  drillRegion=r; drillCountries=[];
  document.querySelectorAll('.drill-reg-btn').forEach(b=>b.className='drill-reg-btn'+(b.dataset.r===r?' on':''));
  renderDrill();
}

function renderDrill(){
  buildDrillRegBtns();
  const period=document.getElementById('drPeriod').value;
  const years=getYears(period);
  const rId=drillRegion;
  const clist=COUNTRIES[rId]||[];
  const rLabel=RLABELS[REGIONS.indexOf(rId)];

  const pillsHtml=clist.map(c=>`<button class="spill${drillCountries.includes(c.k)?' on':''}" onclick="toggleDrillCountry('${c.k}')">${c.l}</button>`).join('');

  const activeCtry = drillCountries.length>0 ? clist.filter(c=>drillCountries.includes(c.k)) : null;

  let trendData, trendLabels, trendDatasets;
  if(activeCtry){
    trendLabels=years;
    trendDatasets=activeCtry.map((c,i)=>{
      const clrs=['#e05a4a','#f07060','#ff8070','#ff9080','#ffa090','#ffb0a0'];
      return {label:c.l,data:years.map(y=>Math.round(RD[rId][y-1950]*c.f)),backgroundColor:clrs[i%6],borderColor:clrs[i%6],borderWidth:drillChartView==='line'?2:0,pointRadius:0,fill:false,tension:.3};
    });
  } else {
    trendLabels=years;
    trendDatasets=[{label:rLabel,data:years.map(y=>RD[rId][y-1950]),backgroundColor:'#e05a4a',borderColor:'#e05a4a',borderWidth:drillChartView==='line'?2:0,pointRadius:0,fill:drillChartView==='line',tension:.3}];
  }

  const ctryTotals=clist.map(c=>({l:c.l,v:Math.round(years.reduce((s,y)=>s+RD[rId][y-1950]*c.f,0))})).sort((a,b)=>b.v-a.v);
  const maxCtry=ctryTotals[0]?.v||1;

  const totArr=years.map(y=>RD[rId][y-1950]);
  const tot=totArr.reduce((a,b)=>a+b,0);
  const peak=Math.max(...totArr);
  const peakY=years[totArr.indexOf(peak)];
  const first=totArr[0],last=totArr[totArr.length-1];
  const growth=first>0?((last-first)/first*100).toFixed(1):'—';

  document.getElementById('panelDrill').innerHTML=`
    <div style="font-size:11px;color:#888;margin-bottom:6px">Drill Down — <span style="color:#e05a4a;font-weight:700">${rLabel}</span> country level :</div>
    <div style="font-size:10px;color:#666;margin-bottom:8px">Click country pills to compare specific countries, or leave all deselected to see the full region.</div>
    <div class="sub-pills">${pillsHtml}</div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-lbl">Region Total</div><div class="kpi-val">${fmt(tot)}</div><div class="kpi-sub">Selected period</div></div>
      <div class="kpi"><div class="kpi-lbl">Peak Year</div><div class="kpi-val">${peakY}</div><div class="kpi-sub">${fmt(peak)}</div></div>
      <div class="kpi"><div class="kpi-lbl">Avg Annual</div><div class="kpi-val">${fmt(Math.round(tot/Math.max(years.length,1)))}</div><div class="kpi-sub">Per year</div></div>
      <div class="kpi"><div class="kpi-lbl">Countries</div><div class="kpi-val">${clist.length}</div><div class="kpi-sub">In region</div></div>
      <div class="kpi"><div class="kpi-lbl">Growth</div><div class="kpi-val" style="font-size:13px">${growth!=='—'?(+growth>0?'+':'')+growth+'%':growth}</div><div class="kpi-sub">Period change</div></div>
    </div>
    <div class="charts-row">
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div class="panel-title">${activeCtry?'Selected countries':'Region trend — '+rLabel}</div><div style="font-size:9px;color:#888;margin-bottom:4px">By Year</div></div>
          <div class="toggle-row">
            <button class="tgl ${drillChartView==='bar'?'on':''}" onclick="setDrillView('bar',this)">Bar</button>
            <button class="tgl ${drillChartView==='line'?'on':''}" onclick="setDrillView('line',this)">Line</button>
          </div>
        </div>
        <div style="position:relative;width:100%;height:200px"><canvas id="drillTrend"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-title">Country breakdown</div>
        <div style="font-size:9px;color:#666;margin-bottom:6px">Cumulative — selected period</div>
        ${makeBars(ctryTotals,maxCtry)}
      </div>
    </div>`;

  if(drillChart) drillChart.destroy();
  drillChart=new Chart(document.getElementById('drillTrend'),{
    type:drillChartView==='bar'?'bar':'line',
    data:{labels:trendLabels,datasets:trendDatasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:activeCtry!=null,labels:{color:'#aaa',font:{size:9},boxWidth:10}},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+fmt(c.raw)},backgroundColor:'#333',titleColor:'#fff',bodyColor:'#ccc'}},scales:{x:{ticks:{maxTicksLimit:10,color:'#666',font:{size:9}},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{callback:v=>fmt(v),color:'#666',font:{size:9}},grid:{color:'rgba(255,255,255,0.05)'}}}}
  });
}

function toggleDrillCountry(k){
  const idx=drillCountries.indexOf(k);
  if(idx>=0) drillCountries.splice(idx,1); else drillCountries.push(k);
  renderDrill();
}

function setDrillView(v,btn){drillChartView=v;renderDrill();}

document.getElementById('drPeriod').addEventListener('change',renderDrill);

renderOverview();
</script>
